<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Account Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-container {
            text-align: center;
        }

        .password-input {
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            width: 300px;
            margin: 20px 0;
            transition: all 0.3s ease;
        }

        .password-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn, .check-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }

        .login-btn:hover, .check-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .remember-me {
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .checker-container {
            display: none;
        }

        .input-group {
            text-align: center;
            margin: 30px 0;
        }

        .username-input {
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            width: 400px;
            max-width: 100%;
            transition: all 0.3s ease;
        }

        .username-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .results {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            display: none;
        }

        .result-item {
            padding: 15px;
            margin: 10px 0;
            background: white;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .result-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .result-item.danger {
            border-left-color: #e74c3c;
            background: #fff5f5;
        }

        .result-item.warning {
            border-left-color: #f39c12;
            background: #fff9e6;
        }

        .result-item.success {
            border-left-color: #27ae60;
            background: #f0fff4;
        }

        .result-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .result-value {
            color: #666;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .score-container {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            color: white;
        }

        .score {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }

        .score-label {
            font-size: 18px;
            opacity: 0.9;
        }

        .error-message {
            color: #e74c3c;
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: #fff5f5;
            border-radius: 10px;
            border: 1px solid #e74c3c;
            display: none;
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: white;
            color: #667eea;
        }
    </style>
</head>
<body>
    <button class="logout-btn" onclick="logout()" style="display: none;" id="logoutBtn">Logout</button>
    
    <div class="container">
        <h1>Roblox Account Checker</h1>
        
        <div class="login-container" id="loginContainer">
            <h2>Enter Password to Access</h2>
            <input type="password" class="password-input" id="passwordInput" placeholder="Enter password">
            <br>
            <div class="remember-me">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember me for 7 days</label>
            </div>
            <button class="login-btn" onclick="checkPassword()">Login</button>
            <div class="error-message" id="loginError"></div>
        </div>

        <div class="checker-container" id="checkerContainer">
            <div class="input-group">
                <input type="text" class="username-input" id="usernameInput" placeholder="Enter Roblox Username">
                <br><br>
                <button class="check-btn" onclick="checkAccount()">Check Account</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing account...</p>
            </div>

            <div class="results" id="results"></div>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = 'AccountChecker123';
        const REMEMBER_KEY = 'roblox_checker_auth';
        const REMEMBER_EXPIRY = 7 * 24 * 60 * 60 * 1000; // 7 days

        const loginContainer = document.getElementById('loginContainer');
        const checkerContainer = document.getElementById('checkerContainer');
        const logoutBtn = document.getElementById('logoutBtn');
        const passwordInput = document.getElementById('passwordInput');
        const rememberMeCheckbox = document.getElementById('rememberMe');
        const loginErrorDiv = document.getElementById('loginError');
        const usernameInput = document.getElementById('usernameInput');
        const loadingEl = document.getElementById('loading');
        const resultsEl = document.getElementById('results');

        // Initialize authentication state on load
        window.addEventListener('load', () => {
            try {
                const authDataRaw = localStorage.getItem(REMEMBER_KEY);
                if (!authDataRaw) return;

                const authData = JSON.parse(authDataRaw);
                if (authData && typeof authData.timestamp === 'number') {
                    if (Date.now() - authData.timestamp < REMEMBER_EXPIRY) {
                        showChecker();
                    } else {
                        localStorage.removeItem(REMEMBER_KEY);
                    }
                }
            } catch {
                // If anything goes wrong with localStorage, fail silently
            }
        });

        function checkPassword() {
            const password = passwordInput.value.trim();
            const rememberMe = rememberMeCheckbox.checked;

            loginErrorDiv.style.display = 'none';
            loginErrorDiv.textContent = '';

            if (!password) {
                showLoginError('Please enter a password.');
                return;
            }

            if (password === CORRECT_PASSWORD) {
                if (rememberMe) {
                    try {
                        localStorage.setItem(
                            REMEMBER_KEY,
                            JSON.stringify({ timestamp: Date.now() })
                        );
                    } catch {
                        // Ignore storage errors
                    }
                }
                showChecker();
            } else {
                showLoginError('Incorrect password. Please try again.');
            }
        }

        function showLoginError(message) {
            loginErrorDiv.textContent = message;
            loginErrorDiv.style.display = 'block';
        }

        function showChecker() {
            if (loginContainer) loginContainer.style.display = 'none';
            if (checkerContainer) checkerContainer.style.display = 'block';
            if (logoutBtn) logoutBtn.style.display = 'block';
            passwordInput.value = '';
        }

        function logout() {
            try {
                localStorage.removeItem(REMEMBER_KEY);
            } catch {
                // Ignore storage errors
            }

            if (checkerContainer) checkerContainer.style.display = 'none';
            if (loginContainer) loginContainer.style.display = 'block';
            if (logoutBtn) logoutBtn.style.display = 'none';

            usernameInput.value = '';
            resultsEl.innerHTML = '';
            resultsEl.style.display = 'none';
            loadingEl.style.display = 'none';
        }

        function checkAccount() {
            const username = usernameInput.value.trim();
            resultsEl.innerHTML = '';
            resultsEl.style.display = 'none';

            if (!username) {
                showResultsError('Please enter a Roblox username to check.');
                return;
            }

            loadingEl.style.display = 'block';

            // Simulate an async check – replace with real API when available
            setTimeout(() => {
                loadingEl.style.display = 'none';
                renderMockResults(username);
            }, 1200);
        }

        function showResultsError(message) {
            resultsEl.innerHTML = `
                <div class="result-item danger">
                    <div class="result-title">Error</div>
                    <div class="result-value">${message}</div>
                </div>
            `;
            resultsEl.style.display = 'block';
        }

        function renderMockResults(username) {
            const score = Math.floor(Math.random() * 41) + 60; // 60–100
            const riskLevel =
                score > 85 ? 'Low Risk' :
                score > 70 ? 'Medium Risk' :
                'High Risk';

            resultsEl.innerHTML = `
                <div class="score-container">
                    <div class="score-label">Account Safety Score for <strong>${escapeHtml(username)}</strong></div>
                    <div class="score">${score}</div>
                    <div class="score-label">${riskLevel}</div>
                </div>
                <div class="result-item ${score < 70 ? 'danger' : score < 85 ? 'warning' : 'success'}">
                    <div class="result-title">Password Security</div>
                    <div class="result-value">
                        ${
                            score > 85
                                ? 'Your account appears to have strong security. Keep using a unique and complex password.'
                                : score > 70
                                ? 'Your password is decent, but it could be more secure. Consider adding more length and special characters.'
                                : 'Your account may be at higher risk. We recommend changing your password and enabling extra security wherever possible.'
                        }
                    </div>
                </div>
                <div class="result-item warning">
                    <div class="result-title">General Advice</div>
                    <div class="result-value">
                        Never share your password with anyone, avoid logging in on untrusted devices, and enable additional verification options if available.
                    </div>
                </div>
            `;

            resultsEl.style.display = 'block';
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // Allow pressing Enter to submit login and username checks
        if (passwordInput) {
            passwordInput.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    checkPassword();
                }
            });
        }

        if (usernameInput) {
            usernameInput.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    checkAccount();
                }
            });
        }
    </script>
</body>
</html>
